<div class="flex h-screen overflow-hidden" style="background:var(--page-bg)">

  <!-- Mobile backdrop -->
  <div *ngIf="mobileSidebarOpen" class="fixed inset-0 z-20 lg:hidden"
    style="background:rgba(15,23,42,0.5);backdrop-filter:blur(3px)"
    (click)="mobileSidebarOpen = false"></div>

  <!-- Sidebar -->
  <aside class="fixed inset-y-0 left-0 z-30 flex flex-col transition-transform duration-300 ease-in-out lg:static lg:translate-x-0 lg:z-auto"
    style="width:232px;background:#0f172a;border-right:1px solid #1e293b;box-shadow:4px 0 24px rgba(0,0,0,0.12)"
    [class.-translate-x-full]="!mobileSidebarOpen" [class.translate-x-0]="mobileSidebarOpen">

    <div class="flex items-center gap-3 flex-shrink-0 px-5" style="height:60px;border-bottom:1px solid #1e293b">
      <app-logo [iconSize]="34" [showName]="false"></app-logo>
      <div>
        <p class="font-bold text-white leading-tight" style="font-size:14.5px;letter-spacing:-0.01em">Platform Console</p>
        <p style="font-size:10px;color:#475569;font-weight:500;letter-spacing:0.04em">SUPER ADMIN</p>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto scrollbar-none py-3 px-2">
      <ul class="space-y-0.5">
        <li *ngFor="let item of navItems">
          <a [routerLink]="item.route" routerLinkActive="active" class="sidebar-link group">
            <ng-container *ngTemplateOutlet="iconTpl; context:{icon:item.icon}"></ng-container>
            <span class="flex-1 truncate">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="flex-shrink-0 px-4 py-3" style="border-top:1px solid #1e293b">
      <div class="flex items-center gap-3 p-2 rounded-xl" style="background:rgba(255,255,255,0.04)">
        <div class="avatar avatar-md flex-shrink-0" style="background:linear-gradient(135deg,#7c3aed,#a855f7)">{{ userInitials }}</div>
        <div class="flex-1 min-w-0">
          <p class="text-white font-semibold truncate" style="font-size:13px">{{ authService.currentUser?.name }}</p>
          <p class="truncate" style="font-size:11px;color:#64748b">Platform Owner</p>
        </div>
        <button (click)="logout()" title="Sign Out" class="flex-shrink-0 p-1.5 rounded-lg transition-colors" style="color:#64748b">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <header class="flex-shrink-0 flex items-center px-5 z-10" style="height:60px;background:#fff;border-bottom:1px solid #e2e8f0">
      <button (click)="mobileSidebarOpen = !mobileSidebarOpen" class="lg:hidden p-2 rounded-lg" style="color:#64748b">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <p class="font-semibold" style="font-size:14px;color:#0f172a">Platform Console</p>
    </header>
    <main class="flex-1 overflow-y-auto" style="background:var(--page-bg)">
      <div class="p-6">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>

<ng-template #iconTpl let-icon="icon">
  <svg *ngIf="icon==='home'" class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
  <svg *ngIf="icon==='building'" class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
  <svg *ngIf="icon==='tag'" class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
  <svg *ngIf="icon==='card'" class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
</ng-template>
