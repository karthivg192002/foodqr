<div>
  <div class="flex items-center justify-between mb-6">
    <h1 class="page-title">Customers</h1>
    <span class="badge-info">{{ total }} total</span>
  </div>
  <div class="card mb-5">
    <input [(ngModel)]="search" (ngModelChange)="page=1; load()" type="text" placeholder="Search customers..." class="input-field w-64">
  </div>
  <div class="card overflow-hidden p-0">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b">
        <tr>
          <th class="px-5 py-3 text-left font-semibold text-gray-600">Name</th>
          <th class="px-5 py-3 text-left font-semibold text-gray-600">Email</th>
          <th class="px-5 py-3 text-left font-semibold text-gray-600">Phone</th>
          <th class="px-5 py-3 text-right font-semibold text-gray-600">Balance</th>
          <th class="px-5 py-3 text-center font-semibold text-gray-600">Status</th>
          <th class="px-5 py-3 text-left font-semibold text-gray-600">Joined</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of customers" class="border-b border-gray-50 hover:bg-gray-50">
          <td class="px-5 py-3 font-medium text-gray-900">{{ c.name }}</td>
          <td class="px-5 py-3 text-gray-600">{{ c.email }}</td>
          <td class="px-5 py-3 text-gray-600">{{ c.phone || '—' }}</td>
          <td class="px-5 py-3 text-right font-semibold">${{ c.balance | number:'1.2-2' }}</td>
          <td class="px-5 py-3 text-center">
            <span [class]="c.status === 'active' ? 'badge-success' : 'badge-danger'">{{ c.status }}</span>
          </td>
          <td class="px-5 py-3 text-gray-500 text-xs">{{ c.createdAt | date:'mediumDate' }}</td>
        </tr>
        <tr *ngIf="!customers.length && !loading">
          <td colspan="6" class="px-5 py-12 text-center text-gray-400">No customers found</td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="pages > 1" class="flex justify-between items-center px-5 py-4 border-t">
      <span class="text-sm text-gray-500">{{ total }} customers</span>
      <div class="flex gap-2">
        <button (click)="page=page-1; load()" [disabled]="page===1" class="btn-secondary py-1.5 px-3 text-xs disabled:opacity-50">Prev</button>
        <button (click)="page=page+1; load()" [disabled]="page>=pages" class="btn-secondary py-1.5 px-3 text-xs disabled:opacity-50">Next</button>
      </div>
    </div>
  </div>
</div>
