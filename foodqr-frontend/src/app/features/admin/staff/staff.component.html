<div>
  <div class="flex items-center justify-between mb-6">
    <h1 class="page-title">Staff</h1>
    <button (click)="showForm = true; form.reset({role:'waiter'})" class="btn-primary flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Add Staff
    </button>
  </div>

  <div *ngIf="loading" class="flex justify-center py-12">
    <div class="animate-spin w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full"></div>
  </div>

  <div *ngIf="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    <div *ngFor="let s of staff" class="card">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center text-gray-600 font-bold">
          {{ s.name?.[0]?.toUpperCase() }}
        </div>
        <div>
          <h3 class="font-semibold text-gray-900">{{ s.name }}</h3>
          <span class="badge-info capitalize">{{ s.role?.replace('_', ' ') }}</span>
        </div>
      </div>
      <p class="text-sm text-gray-600">{{ s.email }}</p>
      <p class="text-sm text-gray-500">{{ s.phone || 'No phone' }}</p>
    </div>
    <p *ngIf="!staff.length" class="col-span-full text-center text-gray-400 py-12">No staff members found</p>
  </div>

  <div *ngIf="showForm" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
      <div class="flex items-center justify-between p-6 border-b">
        <h2 class="font-bold text-gray-900">Add Staff Member</h2>
        <button (click)="showForm = false">✕</button>
      </div>
      <form [formGroup]="form" (ngSubmit)="save()" class="p-6 space-y-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
          <input formControlName="name" class="input-field"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
          <input formControlName="email" type="email" class="input-field"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Password *</label>
          <input formControlName="password" type="password" class="input-field"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
          <input formControlName="phone" class="input-field"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Role *</label>
          <select formControlName="role" class="input-field">
            <option *ngFor="let r of roles" [value]="r">{{ r | titlecase }}</option>
          </select></div>
        <div class="flex gap-3 pt-2">
          <button type="submit" [disabled]="saving" class="btn-primary flex-1">{{ saving ? 'Saving...' : 'Add Staff' }}</button>
          <button type="button" (click)="showForm = false" class="btn-secondary flex-1">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
