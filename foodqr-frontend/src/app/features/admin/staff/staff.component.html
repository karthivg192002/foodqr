<div class="space-y-5 fade-in-up">

  <!-- Page header -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Staff & Employees</h1>
      <p class="page-subtitle">Manage your team members and their access roles</p>
    </div>
    <button (click)="showForm=true; form.reset({role:'waiter'})" class="btn-primary">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Add Staff Member
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex items-center justify-center py-20">
    <div class="spinner"></div>
  </div>

  <!-- Staff grid -->
  <div *ngIf="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
    <div *ngFor="let s of staff"
      class="card p-5 transition-all duration-200"
      onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)';this.style.transform='translateY(-2px)'"
      onmouseout="this.style.boxShadow='';this.style.transform='translateY(0)'">
      <div class="flex items-start gap-3.5">
        <div class="avatar avatar-lg flex-shrink-0" style="background:linear-gradient(135deg,#6366f1,#a78bfa)">
          {{ s.name?.charAt(0)?.toUpperCase() }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="font-bold truncate" style="font-size:14.5px;color:#0f172a">{{ s.name }}</p>
          <div class="mt-1">
            <span class="badge-purple badge-plain capitalize" style="font-size:11px">{{ s.role?.replace('_', ' ') }}</span>
          </div>
        </div>
      </div>
      <div class="mt-4 space-y-1.5">
        <div class="flex items-center gap-2">
          <svg class="w-3.5 h-3.5 flex-shrink-0" style="color:#94a3b8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          <span class="truncate" style="font-size:12.5px;color:#64748b">{{ s.email }}</span>
        </div>
        <div class="flex items-center gap-2">
          <svg class="w-3.5 h-3.5 flex-shrink-0" style="color:#94a3b8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          <span style="font-size:12.5px;color:#64748b">{{ s.phone || 'No phone' }}</span>
        </div>
      </div>
    </div>

    <div *ngIf="!staff.length" class="col-span-full">
      <div class="empty-state card py-16">
        <div class="empty-state-icon">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </div>
        <p class="empty-state-title">No staff members yet</p>
        <p class="empty-state-desc">Add your first staff member to get started managing your team.</p>
        <button (click)="showForm=true; form.reset({role:'waiter'})" class="btn-primary btn-sm">Add First Member</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Add Staff Modal ── -->
<div *ngIf="showForm" class="modal-backdrop">
  <div class="modal-box" style="max-width:460px">
    <div class="modal-header">
      <p class="modal-header-title">Add Staff Member</p>
      <button (click)="showForm=false" class="modal-close-btn">×</button>
    </div>
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="modal-body space-y-4">
        <div class="form-group">
          <label class="label">Full Name <span style="color:#dc2626">*</span></label>
          <input formControlName="name" class="input-field" placeholder="Enter full name">
        </div>
        <div class="form-group">
          <label class="label">Email Address <span style="color:#dc2626">*</span></label>
          <input formControlName="email" type="email" class="input-field" placeholder="staff@restaurant.com">
        </div>
        <div class="form-group">
          <label class="label">Password <span style="color:#dc2626">*</span></label>
          <input formControlName="password" type="password" class="input-field" placeholder="Minimum 6 characters">
        </div>
        <div class="form-group">
          <label class="label">Phone Number</label>
          <input formControlName="phone" class="input-field" placeholder="+1 234 567 8900">
        </div>
        <div class="form-group">
          <label class="label">Role <span style="color:#dc2626">*</span></label>
          <select formControlName="role" class="input-field">
            <option *ngFor="let r of roles" [value]="r.name">{{ r.label }}</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" (click)="showForm=false" class="btn-secondary btn-sm">Cancel</button>
        <button type="submit" [disabled]="saving || form.invalid" class="btn-primary btn-sm">
          {{ saving ? 'Creating…' : 'Create Staff Member' }}
        </button>
      </div>
    </form>
  </div>
</div>
