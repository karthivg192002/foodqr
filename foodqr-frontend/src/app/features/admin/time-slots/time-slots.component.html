<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Branch Time Slots</h1>
    <div class="flex items-center gap-3">
      <select [(ngModel)]="selectedBranchId" (change)="onBranchChange()" class="input">
        <option *ngFor="let b of branches" [value]="b.id">{{ b.name }}</option>
      </select>
      <button (click)="save()" [disabled]="saving" class="btn btn-primary">
        {{ saving ? 'Saving...' : 'Save Time Slots' }}
      </button>
    </div>
  </div>

  <div *ngIf="loading" class="text-center py-8 text-gray-400">Loading...</div>

  <div *ngIf="!loading" class="bg-white rounded-xl shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
        <tr>
          <th class="px-4 py-3 text-left">Day</th>
          <th class="px-4 py-3 text-left">Open</th>
          <th class="px-4 py-3 text-left">Opening Time</th>
          <th class="px-4 py-3 text-left">Closing Time</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let slot of slots" class="border-t hover:bg-gray-50">
          <td class="px-4 py-3 font-medium">{{ dayNames[slot.day] }}</td>
          <td class="px-4 py-3">
            <input type="checkbox" [(ngModel)]="slot.isOpen" class="rounded" />
          </td>
          <td class="px-4 py-3">
            <input type="time" [(ngModel)]="slot.openingTime" [disabled]="!slot.isOpen" class="input" />
          </td>
          <td class="px-4 py-3">
            <input type="time" [(ngModel)]="slot.closingTime" [disabled]="!slot.isOpen" class="input" />
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
