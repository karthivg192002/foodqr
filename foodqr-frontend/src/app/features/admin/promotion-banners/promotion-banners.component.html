<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Promotion Banners</h1>
    <button (click)="openCreate()" class="btn-primary px-4 py-2 text-sm">+ Add Banner</button>
  </div>

  <!-- Form modal -->
  <div *ngIf="showForm" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl w-full max-w-lg p-6 max-h-screen overflow-y-auto">
      <h2 class="text-lg font-bold text-gray-900 mb-4">{{ editingId ? 'Edit' : 'New' }} Promotion Banner</h2>
      <form [formGroup]="form" (ngSubmit)="save()" class="space-y-3">
        <div>
          <label class="label">Title *</label>
          <input formControlName="title" class="input w-full" placeholder="e.g. Weekend Special">
        </div>
        <div>
          <label class="label">Subtitle</label>
          <input formControlName="subtitle" class="input w-full" placeholder="Short tagline">
        </div>
        <div>
          <label class="label">Description</label>
          <textarea formControlName="description" class="input w-full" rows="2"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label">Badge Text</label>
            <input formControlName="badgeText" class="input w-full" placeholder="e.g. HOT">
          </div>
          <div>
            <label class="label">Badge Color</label>
            <input formControlName="badgeColor" type="color" class="input w-full h-10 cursor-pointer">
          </div>
        </div>
        <div>
          <label class="label">Link URL</label>
          <input formControlName="linkUrl" class="input w-full" placeholder="https://...">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label">Start Date</label>
            <input formControlName="startDate" type="date" class="input w-full">
          </div>
          <div>
            <label class="label">End Date</label>
            <input formControlName="endDate" type="date" class="input w-full">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label">Sort Order</label>
            <input formControlName="sortOrder" type="number" class="input w-full" min="0">
          </div>
          <div class="flex items-center gap-2 mt-5">
            <input formControlName="status" type="checkbox" id="status" class="w-4 h-4">
            <label for="status" class="text-sm">Active</label>
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" [disabled]="saving" class="btn-primary px-5 py-2 text-sm flex-1">
            {{ saving ? 'Saving...' : (editingId ? 'Update' : 'Create') }}
          </button>
          <button type="button" (click)="showForm=false" class="btn-secondary px-5 py-2 text-sm flex-1">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- List -->
  <div *ngIf="loading" class="text-center py-12 text-gray-400">Loading...</div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <div *ngFor="let b of banners" class="bg-white rounded-2xl shadow-sm overflow-hidden">
      <div class="h-24 bg-gradient-to-r from-orange-400 to-orange-600 relative flex items-center justify-center">
        <span class="text-white font-bold text-lg">{{ b.title }}</span>
        <span *ngIf="b.badgeText" class="absolute top-2 right-2 text-xs text-white font-bold px-2 py-0.5 rounded-full"
          [style.background-color]="b.badgeColor || '#FF6B35'">{{ b.badgeText }}</span>
      </div>
      <div class="p-4">
        <p class="text-sm text-gray-600 mb-1">{{ b.subtitle }}</p>
        <p *ngIf="b.startDate || b.endDate" class="text-xs text-gray-400">
          {{ b.startDate | date:'MMM d' }} – {{ b.endDate | date:'MMM d, y' }}
        </p>
        <div class="flex items-center justify-between mt-3">
          <span [class]="b.status ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'"
            class="text-xs font-medium px-2 py-1 rounded-full">{{ b.status ? 'Active' : 'Inactive' }}</span>
          <div class="flex gap-2">
            <button (click)="openEdit(b)" class="text-blue-500 text-sm font-medium">Edit</button>
            <button (click)="delete(b.id)" class="text-red-500 text-sm font-medium">Delete</button>
          </div>
        </div>
      </div>
    </div>
    <div *ngIf="!loading && !banners.length" class="col-span-3 text-center py-16 text-gray-400">
      No promotion banners yet
    </div>
  </div>
</div>
