<div class="p-6">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">Settings</h1>

  <div *ngIf="loading" class="flex justify-center py-20">
    <div class="animate-spin w-8 h-8 border-4 border-primary-500 border-t-transparent rounded-full"></div>
  </div>

  <div *ngIf="!loading" class="flex flex-col lg:flex-row gap-6">
    <!-- Sidebar tabs -->
    <aside class="lg:w-52 flex-shrink-0">
      <nav class="bg-white rounded-xl shadow-sm overflow-hidden">
        <button *ngFor="let tab of tabs" (click)="activeTab = tab.key"
          [class.bg-primary-50]="activeTab === tab.key"
          [class.text-primary-700]="activeTab === tab.key"
          [class.border-r-4]="activeTab === tab.key"
          [class.border-primary-500]="activeTab === tab.key"
          [class.font-semibold]="activeTab === tab.key"
          [class.text-gray-600]="activeTab !== tab.key"
          class="w-full text-left px-4 py-3 text-sm border-b border-gray-100 hover:bg-gray-50 transition-all">
          {{ tab.label }}
        </button>
      </nav>
    </aside>

    <!-- Content panel -->
    <div class="flex-1">

      <!-- COMPANY -->
      <div *ngIf="activeTab === 'company'" class="bg-white rounded-xl shadow-sm">
        <div class="px-6 py-4 border-b"><h2 class="font-semibold text-gray-800">Company Information</h2></div>
        <div class="px-6 py-5 space-y-4 max-w-2xl">
          <div><label class="block text-sm font-medium mb-1">Business Name</label>
            <input [(ngModel)]="companySettings['business_name']" class="input w-full" /></div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium mb-1">Email</label>
              <input [(ngModel)]="companySettings['business_email']" type="email" class="input w-full" /></div>
            <div><label class="block text-sm font-medium mb-1">Phone</label>
              <input [(ngModel)]="companySettings['business_phone']" class="input w-full" /></div>
          </div>
          <div><label class="block text-sm font-medium mb-1">Address</label>
            <input [(ngModel)]="companySettings['business_address']" class="input w-full" /></div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium mb-1">City</label>
              <input [(ngModel)]="companySettings['business_city']" class="input w-full" /></div>
            <div><label class="block text-sm font-medium mb-1">Country</label>
              <input [(ngModel)]="companySettings['business_country']" class="input w-full" /></div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium mb-1">Currency Symbol</label>
              <input [(ngModel)]="companySettings['currency_symbol']" class="input w-full" /></div>
            <div><label class="block text-sm font-medium mb-1">Currency Code</label>
              <input [(ngModel)]="companySettings['currency_code']" class="input w-full" /></div>
          </div>
          <div><label class="block text-sm font-medium mb-1">Timezone</label>
            <input [(ngModel)]="companySettings['timezone']" class="input w-full" placeholder="UTC" /></div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium mb-1">Logo URL</label>
              <input [(ngModel)]="companySettings['logo']" class="input w-full" /></div>
            <div><label class="block text-sm font-medium mb-1">Favicon URL</label>
              <input [(ngModel)]="companySettings['favicon']" class="input w-full" /></div>
          </div>
        </div>
        <div class="px-6 py-4 border-t flex justify-end">
          <button (click)="save('company')" [disabled]="saving" class="btn btn-primary">{{ saving ? 'Saving...' : 'Save' }}</button>
        </div>
      </div>

      <!-- SITE -->
      <div *ngIf="activeTab === 'site'" class="bg-white rounded-xl shadow-sm">
        <div class="px-6 py-4 border-b"><h2 class="font-semibold text-gray-800">Site Settings</h2></div>
        <div class="px-6 py-5 space-y-4 max-w-2xl">
          <div><label class="block text-sm font-medium mb-1">Meta Title</label>
            <input [(ngModel)]="siteSettings['meta_title']" class="input w-full" /></div>
          <div><label class="block text-sm font-medium mb-1">Meta Description</label>
            <textarea [(ngModel)]="siteSettings['meta_description']" class="input w-full" rows="3"></textarea></div>
          <div><label class="block text-sm font-medium mb-1">Google Analytics ID</label>
            <input [(ngModel)]="siteSettings['google_analytics_id']" class="input w-full" placeholder="G-XXXXXXXX" /></div>
          <div class="flex items-center gap-3">
            <input type="checkbox" [(ngModel)]="siteSettings['maintenance_mode']" id="maintenance" />
            <label for="maintenance" class="text-sm font-medium">Maintenance Mode</label>
          </div>
          <div class="flex items-center gap-3">
            <input type="checkbox" [(ngModel)]="siteSettings['customer_registration']" id="registration" />
            <label for="registration" class="text-sm font-medium">Allow Customer Registration</label>
          </div>
        </div>
        <div class="px-6 py-4 border-t flex justify-end">
          <button (click)="save('site')" [disabled]="saving" class="btn btn-primary">{{ saving ? 'Saving...' : 'Save' }}</button>
        </div>
      </div>

      <!-- ORDER SETUP -->
      <div *ngIf="activeTab === 'order_setup'" class="bg-white rounded-xl shadow-sm">
        <div class="px-6 py-4 border-b"><h2 class="font-semibold text-gray-800">Order Setup</h2></div>
        <div class="px-6 py-5 space-y-4 max-w-2xl">
          <div class="grid grid-cols-2 gap-3">
            <label class="flex items-center gap-2 p-3 border rounded-xl cursor-pointer">
              <input type="checkbox" [(ngModel)]="orderSetupSettings['enable_delivery']" />
              <span class="text-sm font-medium">Delivery</span>
            </label>
            <label class="flex items-center gap-2 p-3 border rounded-xl cursor-pointer">
              <input type="checkbox" [(ngModel)]="orderSetupSettings['enable_takeaway']" />
              <span class="text-sm font-medium">Takeaway</span>
            </label>
            <label class="flex items-center gap-2 p-3 border rounded-xl cursor-pointer">
              <input type="checkbox" [(ngModel)]="orderSetupSettings['enable_dining_table']" />
              <span class="text-sm font-medium">Dine In</span>
            </label>
            <label class="flex items-center gap-2 p-3 border rounded-xl cursor-pointer">
              <input type="checkbox" [(ngModel)]="orderSetupSettings['enable_pos']" />
              <span class="text-sm font-medium">POS</span>
            </label>
            <label class="flex items-center gap-2 p-3 border rounded-xl cursor-pointer">
              <input type="checkbox" [(ngModel)]="orderSetupSettings['enable_loyalty']" />
              <span class="text-sm font-medium">Loyalty</span>
            </label>
            <label class="flex items-center gap-2 p-3 border rounded-xl cursor-pointer">
              <input type="checkbox" [(ngModel)]="orderSetupSettings['enable_scheduled_order']" />
              <span class="text-sm font-medium">Scheduled Orders</span>
            </label>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium mb-1">Min Order Amount</label>
              <input [(ngModel)]="orderSetupSettings['min_order_amount']" type="number" class="input w-full" /></div>
            <div><label class="block text-sm font-medium mb-1">Order Prefix</label>
              <input [(ngModel)]="orderSetupSettings['order_prefix']" class="input w-full" /></div>
          </div>
          <hr />
          <p class="text-sm font-semibold text-gray-700">Delivery Charge Configuration</p>
          <div class="grid grid-cols-3 gap-4">
            <div><label class="block text-sm font-medium mb-1">Free Delivery (km)</label>
              <input [(ngModel)]="orderSetupSettings['delivery_free_km']" type="number" class="input w-full" /></div>
            <div><label class="block text-sm font-medium mb-1">Basic Charge ($)</label>
              <input [(ngModel)]="orderSetupSettings['delivery_basic_charge']" type="number" class="input w-full" /></div>
            <div><label class="block text-sm font-medium mb-1">Per Km Charge ($)</label>
              <input [(ngModel)]="orderSetupSettings['delivery_per_km_charge']" type="number" class="input w-full" /></div>
          </div>
        </div>
        <div class="px-6 py-4 border-t flex justify-end">
          <button (click)="save('order_setup')" [disabled]="saving" class="btn btn-primary">{{ saving ? 'Saving...' : 'Save' }}</button>
        </div>
      </div>

      <!-- NOTIFICATIONS -->
      <div *ngIf="activeTab === 'notification'" class="bg-white rounded-xl shadow-sm">
        <div class="px-6 py-4 border-b"><h2 class="font-semibold text-gray-800">Notification Settings</h2></div>
        <div class="px-6 py-5 space-y-4 max-w-2xl">
          <div class="flex items-center gap-3">
            <input type="checkbox" [(ngModel)]="notificationSettings['new_order_admin_notification']" id="adminNotif" />
            <label for="adminNotif" class="text-sm font-medium">New Order — Admin Notification</label>
          </div>
          <div class="flex items-center gap-3">
            <input type="checkbox" [(ngModel)]="notificationSettings['new_order_customer_notification']" id="custNotif" />
            <label for="custNotif" class="text-sm font-medium">New Order — Customer Notification</label>
          </div>
          <div class="flex items-center gap-3">
            <input type="checkbox" [(ngModel)]="notificationSettings['order_status_customer_notification']" id="statusNotif" />
            <label for="statusNotif" class="text-sm font-medium">Order Status Update — Customer Notification</label>
          </div>
          <div><label class="block text-sm font-medium mb-1">Firebase Server Key</label>
            <input [(ngModel)]="notificationSettings['firebase_server_key']" class="input w-full" /></div>
          <div><label class="block text-sm font-medium mb-1">Push Notification Vapid Key</label>
            <input [(ngModel)]="notificationSettings['push_notification_key']" class="input w-full" /></div>
        </div>
        <div class="px-6 py-4 border-t flex justify-end">
          <button (click)="save('notification')" [disabled]="saving" class="btn btn-primary">{{ saving ? 'Saving...' : 'Save' }}</button>
        </div>
      </div>

      <!-- MAIL -->
      <div *ngIf="activeTab === 'mail'" class="bg-white rounded-xl shadow-sm">
        <div class="px-6 py-4 border-b"><h2 class="font-semibold text-gray-800">Email / SMTP Configuration</h2></div>
        <div class="px-6 py-5 space-y-4 max-w-2xl">
          <div><label class="block text-sm font-medium mb-1">Mail Driver</label>
            <select [(ngModel)]="mailSettings['mail_driver']" class="input w-full">
              <option value="smtp">SMTP</option>
              <option value="sendmail">Sendmail</option>
              <option value="mailgun">Mailgun</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium mb-1">Host</label>
              <input [(ngModel)]="mailSettings['mail_host']" class="input w-full" /></div>
            <div><label class="block text-sm font-medium mb-1">Port</label>
              <input [(ngModel)]="mailSettings['mail_port']" class="input w-full" /></div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium mb-1">Username</label>
              <input [(ngModel)]="mailSettings['mail_username']" class="input w-full" /></div>
            <div><label class="block text-sm font-medium mb-1">Password</label>
              <input [(ngModel)]="mailSettings['mail_password']" type="password" class="input w-full" /></div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium mb-1">From Email</label>
              <input [(ngModel)]="mailSettings['mail_from_address']" type="email" class="input w-full" /></div>
            <div><label class="block text-sm font-medium mb-1">From Name</label>
              <input [(ngModel)]="mailSettings['mail_from_name']" class="input w-full" /></div>
          </div>
          <div><label class="block text-sm font-medium mb-1">Encryption</label>
            <select [(ngModel)]="mailSettings['mail_encryption']" class="input w-full">
              <option value="">None</option>
              <option value="tls">TLS</option>
              <option value="ssl">SSL</option>
            </select>
          </div>
        </div>
        <div class="px-6 py-4 border-t flex justify-end">
          <button (click)="save('mail')" [disabled]="saving" class="btn btn-primary">{{ saving ? 'Saving...' : 'Save' }}</button>
        </div>
      </div>

      <!-- PAYMENT (legacy keys for old SMS/Payment gateway integration) -->
      <div *ngIf="activeTab === 'payment'" class="bg-white rounded-xl shadow-sm">
        <div class="px-6 py-4 border-b"><h2 class="font-semibold text-gray-800">Payment Gateway Keys</h2>
          <p class="text-sm text-gray-400 mt-0.5">For detailed gateway configuration visit Payment Gateways settings.</p></div>
        <div class="px-6 py-5 space-y-4 max-w-2xl">
          <div><label class="block text-sm font-medium mb-1">Stripe Publishable Key</label>
            <input [(ngModel)]="paymentSettings['stripe_key']" class="input w-full" placeholder="pk_live_..." /></div>
          <div><label class="block text-sm font-medium mb-1">Stripe Secret Key</label>
            <input [(ngModel)]="paymentSettings['stripe_secret']" type="password" class="input w-full" /></div>
          <div><label class="block text-sm font-medium mb-1">Razorpay Key ID</label>
            <input [(ngModel)]="paymentSettings['razorpay_key']" class="input w-full" /></div>
          <div><label class="block text-sm font-medium mb-1">Razorpay Key Secret</label>
            <input [(ngModel)]="paymentSettings['razorpay_secret']" type="password" class="input w-full" /></div>
        </div>
        <div class="px-6 py-4 border-t flex justify-end">
          <button (click)="save('payment')" [disabled]="saving" class="btn btn-primary">{{ saving ? 'Saving...' : 'Save' }}</button>
        </div>
      </div>

      <!-- SMS -->
      <div *ngIf="activeTab === 'sms'" class="bg-white rounded-xl shadow-sm">
        <div class="px-6 py-4 border-b"><h2 class="font-semibold text-gray-800">SMS Configuration</h2></div>
        <div class="px-6 py-5 space-y-4 max-w-2xl">
          <div><label class="block text-sm font-medium mb-1">Twilio Account SID</label>
            <input [(ngModel)]="smsSettings['twilio_sid']" class="input w-full" /></div>
          <div><label class="block text-sm font-medium mb-1">Twilio Auth Token</label>
            <input [(ngModel)]="smsSettings['twilio_token']" type="password" class="input w-full" /></div>
          <div><label class="block text-sm font-medium mb-1">Twilio From Number</label>
            <input [(ngModel)]="smsSettings['twilio_from']" class="input w-full" placeholder="+1234567890" /></div>
        </div>
        <div class="px-6 py-4 border-t flex justify-end">
          <button (click)="save('sms')" [disabled]="saving" class="btn btn-primary">{{ saving ? 'Saving...' : 'Save' }}</button>
        </div>
      </div>

      <!-- SOCIAL MEDIA -->
      <div *ngIf="activeTab === 'social_media'" class="bg-white rounded-xl shadow-sm">
        <div class="px-6 py-4 border-b"><h2 class="font-semibold text-gray-800">Social Media Links</h2></div>
        <div class="px-6 py-5 space-y-4 max-w-2xl">
          <div><label class="block text-sm font-medium mb-1">Facebook URL</label>
            <input [(ngModel)]="socialSettings['facebook_url']" class="input w-full" /></div>
          <div><label class="block text-sm font-medium mb-1">Instagram URL</label>
            <input [(ngModel)]="socialSettings['instagram_url']" class="input w-full" /></div>
          <div><label class="block text-sm font-medium mb-1">Twitter / X URL</label>
            <input [(ngModel)]="socialSettings['twitter_url']" class="input w-full" /></div>
          <div><label class="block text-sm font-medium mb-1">YouTube URL</label>
            <input [(ngModel)]="socialSettings['youtube_url']" class="input w-full" /></div>
          <div><label class="block text-sm font-medium mb-1">WhatsApp Number</label>
            <input [(ngModel)]="socialSettings['whatsapp_number']" class="input w-full" placeholder="+1234567890" /></div>
        </div>
        <div class="px-6 py-4 border-t flex justify-end">
          <button (click)="save('social_media')" [disabled]="saving" class="btn btn-primary">{{ saving ? 'Saving...' : 'Save' }}</button>
        </div>
      </div>

      <!-- THEME -->
      <div *ngIf="activeTab === 'theme'" class="bg-white rounded-xl shadow-sm">
        <div class="px-6 py-4 border-b"><h2 class="font-semibold text-gray-800">Theme & Branding</h2></div>
        <div class="px-6 py-5 space-y-4 max-w-2xl">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium mb-1">Primary Color</label>
              <div class="flex gap-2">
                <input type="color" [(ngModel)]="themeSettings['primary_color']" class="h-10 w-16 rounded border" />
                <input [(ngModel)]="themeSettings['primary_color']" class="input flex-1" placeholder="#FF6B35" />
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Secondary Color</label>
              <div class="flex gap-2">
                <input type="color" [(ngModel)]="themeSettings['secondary_color']" class="h-10 w-16 rounded border" />
                <input [(ngModel)]="themeSettings['secondary_color']" class="input flex-1" placeholder="#1A1A2E" />
              </div>
            </div>
          </div>
          <div><label class="block text-sm font-medium mb-1">Font Family</label>
            <select [(ngModel)]="themeSettings['font_family']" class="input w-full">
              <option>Inter</option><option>Roboto</option><option>Open Sans</option><option>Poppins</option>
            </select>
          </div>
        </div>
        <div class="px-6 py-4 border-t flex justify-end">
          <button (click)="save('theme')" [disabled]="saving" class="btn btn-primary">{{ saving ? 'Saving...' : 'Save' }}</button>
        </div>
      </div>

    </div>
  </div>
</div>
