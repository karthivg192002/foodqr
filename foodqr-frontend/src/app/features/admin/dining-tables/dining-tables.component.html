<div>
  <div class="flex items-center justify-between mb-6">
    <h1 class="page-title">Dining Tables</h1>
    <button (click)="openCreate()" class="btn-primary flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Add Table
    </button>
  </div>

  <div *ngIf="loading" class="flex justify-center py-12">
    <div class="animate-spin w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full"></div>
  </div>

  <div *ngIf="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
    <div *ngFor="let table of tables" class="card hover:shadow-md transition-shadow">
      <div class="flex items-start justify-between mb-3">
        <div>
          <h3 class="font-semibold text-gray-900 text-lg">{{ table.name }}</h3>
          <p class="text-sm text-gray-500">Capacity: {{ table.capacity }} seats</p>
        </div>
        <span [class]="getStatusBadge(table.status)">{{ table.status }}</span>
      </div>

      <!-- QR Code preview -->
      <div *ngIf="table.qrCode" class="mb-3 cursor-pointer" (click)="selectedQr = table">
        <img [src]="table.qrCode" class="w-20 h-20 border rounded-lg">
        <p class="text-xs text-gray-400 mt-1">Click to view QR</p>
      </div>

      <div class="flex gap-2 flex-wrap">
        <button (click)="openEdit(table)" class="btn-secondary text-xs py-1.5 px-3">Edit</button>
        <button (click)="regenerateQr(table.id)" class="btn-secondary text-xs py-1.5 px-3">Regen QR</button>
        <button (click)="delete(table.id)" class="text-red-500 hover:text-red-600 text-xs font-medium py-1.5 px-3">Delete</button>
      </div>
    </div>
    <p *ngIf="!tables.length" class="col-span-full text-center text-gray-400 py-12">No tables yet</p>
  </div>

  <!-- QR Modal -->
  <div *ngIf="selectedQr" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" (click)="selectedQr = null">
    <div class="bg-white rounded-2xl p-8 text-center" (click)="$event.stopPropagation()">
      <h3 class="font-bold text-xl mb-4">{{ selectedQr.name }}</h3>
      <img [src]="selectedQr.qrCode" class="w-64 h-64 mx-auto">
      <p class="text-sm text-gray-500 mt-3">Scan to order from this table</p>
      <button (click)="selectedQr = null" class="btn-secondary mt-4">Close</button>
    </div>
  </div>

  <!-- Form Modal -->
  <div *ngIf="showForm" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
      <div class="flex items-center justify-between p-6 border-b">
        <h2 class="font-bold">{{ editingId ? 'Edit' : 'New' }} Table</h2>
        <button (click)="showForm = false">✕</button>
      </div>
      <form [formGroup]="form" (ngSubmit)="save()" class="p-6 space-y-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Table Name *</label>
          <input formControlName="name" class="input-field" placeholder="e.g. Table 1, Table A"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Capacity (seats)</label>
          <input formControlName="capacity" type="number" class="input-field"></div>
        <div class="flex gap-3 pt-2">
          <button type="submit" [disabled]="saving" class="btn-primary flex-1">{{ saving ? 'Saving...' : 'Save' }}</button>
          <button type="button" (click)="showForm = false" class="btn-secondary flex-1">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
