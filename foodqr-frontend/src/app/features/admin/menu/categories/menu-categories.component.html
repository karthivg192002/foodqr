<div>
  <div class="flex items-center justify-between mb-6">
    <h1 class="page-title">Item Categories</h1>
    <button (click)="openCreate()" class="btn-primary flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Add Category
    </button>
  </div>

  <div *ngIf="loading" class="flex justify-center py-12">
    <div class="animate-spin w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full"></div>
  </div>

  <div *ngIf="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
    <div *ngFor="let cat of categories" class="card hover:shadow-md transition-shadow">
      <div class="flex items-start justify-between mb-3">
        <div class="w-10 h-10 bg-orange-100 rounded-lg flex items-center justify-center text-lg">
          {{ cat.icon || '🍽️' }}
        </div>
        <div class="flex gap-1">
          <button (click)="openEdit(cat)" class="text-gray-400 hover:text-orange-500 p-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          </button>
          <button (click)="delete(cat.id)" class="text-gray-400 hover:text-red-500 p-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>
        </div>
      </div>
      <h3 class="font-semibold text-gray-900">{{ cat.name }}</h3>
      <p class="text-xs text-gray-400 mt-1">{{ cat.description || 'No description' }}</p>
      <span [class]="cat.status ? 'badge-success' : 'badge-danger'" class="mt-2 inline-block">{{ cat.status ? 'Active' : 'Inactive' }}</span>
    </div>
    <div *ngIf="!categories.length" class="col-span-full text-center py-12 text-gray-400">No categories yet</div>
  </div>

  <!-- Modal -->
  <div *ngIf="showForm" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
      <div class="flex items-center justify-between p-6 border-b">
        <h2 class="font-bold text-gray-900">{{ editingId ? 'Edit' : 'New' }} Category</h2>
        <button (click)="showForm = false" class="text-gray-400 hover:text-gray-600">✕</button>
      </div>
      <form [formGroup]="form" (ngSubmit)="save()" class="p-6 space-y-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
          <input formControlName="name" class="input-field" placeholder="Category name"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea formControlName="description" class="input-field" rows="2" placeholder="Optional description"></textarea></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Icon (Emoji)</label>
          <input formControlName="icon" class="input-field" placeholder="🍕"></div>
        <div class="flex items-center gap-3">
          <input formControlName="status" type="checkbox" id="status" class="w-4 h-4">
          <label for="status" class="text-sm text-gray-700">Active</label>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" [disabled]="saving" class="btn-primary flex-1">{{ saving ? 'Saving...' : 'Save' }}</button>
          <button type="button" (click)="showForm = false" class="btn-secondary flex-1">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
