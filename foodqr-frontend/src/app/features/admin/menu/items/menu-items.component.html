<div>
  <div class="flex items-center justify-between mb-6">
    <h1 class="page-title">Menu Items</h1>
    <button (click)="openCreate()" class="btn-primary flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Add Item
    </button>
  </div>

  <!-- Filters -->
  <div class="card mb-5 flex flex-wrap gap-3">
    <input [(ngModel)]="search" (ngModelChange)="page=1; loadItems()" type="text" placeholder="Search items..." class="input-field w-48">
    <select [(ngModel)]="filterCategory" (ngModelChange)="page=1; loadItems()" class="input-field w-48">
      <option value="">All Categories</option>
      <option *ngFor="let c of categories" [value]="c.id">{{ c.name }}</option>
    </select>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex justify-center py-12">
    <div class="animate-spin w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full"></div>
  </div>

  <!-- Items Table -->
  <div *ngIf="!loading" class="card overflow-hidden p-0">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr>
          <th class="px-5 py-3 text-left font-semibold text-gray-600">Item</th>
          <th class="px-5 py-3 text-left font-semibold text-gray-600">Category</th>
          <th class="px-5 py-3 text-left font-semibold text-gray-600">Type</th>
          <th class="px-5 py-3 text-right font-semibold text-gray-600">Price</th>
          <th class="px-5 py-3 text-center font-semibold text-gray-600">Featured</th>
          <th class="px-5 py-3 text-center font-semibold text-gray-600">Status</th>
          <th class="px-5 py-3 text-center font-semibold text-gray-600">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of items" class="border-b border-gray-50 hover:bg-gray-50">
          <td class="px-5 py-3">
            <div class="flex items-center gap-3">
              <img *ngIf="item.thumbImage" [src]="item.thumbImage" class="w-10 h-10 rounded-lg object-cover">
              <div *ngIf="!item.thumbImage" class="w-10 h-10 bg-gray-100 rounded-lg flex items-center justify-center text-gray-400">🍽️</div>
              <span class="font-medium text-gray-900">{{ item.name }}</span>
            </div>
          </td>
          <td class="px-5 py-3 text-gray-600">{{ item.category?.name || '—' }}</td>
          <td class="px-5 py-3">
            <span [ngClass]="item.itemType === 'veg' ? 'badge-success' : item.itemType === 'non_veg' ? 'badge-danger' : 'badge-info'" class="capitalize">{{ item.itemType?.replace('_', ' ') }}</span>
          </td>
          <td class="px-5 py-3 text-right font-semibold">${{ item.price | number:'1.2-2' }}</td>
          <td class="px-5 py-3 text-center">
            <button (click)="toggleFeatured(item)" [class]="item.isFeatured ? 'text-yellow-500' : 'text-gray-300'" class="hover:text-yellow-500">
              ⭐
            </button>
          </td>
          <td class="px-5 py-3 text-center">
            <button (click)="toggleStatus(item)" [class]="item.status ? 'bg-green-500' : 'bg-gray-300'" class="w-10 h-5 rounded-full relative transition-colors">
              <span [class]="item.status ? 'translate-x-5' : 'translate-x-0'" class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition-transform inline-block"></span>
            </button>
          </td>
          <td class="px-5 py-3 text-center flex items-center justify-center gap-2">
            <button (click)="openEdit(item)" class="text-orange-500 hover:text-orange-600 font-medium text-xs">Edit</button>
            <button (click)="delete(item.id)" class="text-red-500 hover:text-red-600 font-medium text-xs">Delete</button>
          </td>
        </tr>
        <tr *ngIf="!items.length">
          <td colspan="7" class="px-5 py-12 text-center text-gray-400">No items found</td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="pages > 1" class="flex justify-between items-center px-5 py-4 border-t border-gray-100">
      <span class="text-sm text-gray-500">{{ total }} items</span>
      <div class="flex gap-2">
        <button (click)="page=page-1; loadItems()" [disabled]="page===1" class="btn-secondary py-1.5 px-3 text-xs disabled:opacity-50">Prev</button>
        <button (click)="page=page+1; loadItems()" [disabled]="page>=pages" class="btn-secondary py-1.5 px-3 text-xs disabled:opacity-50">Next</button>
      </div>
    </div>
  </div>

  <!-- Form Modal -->
  <div *ngIf="showForm" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between p-6 border-b sticky top-0 bg-white">
        <h2 class="font-bold text-gray-900">{{ editingId ? 'Edit' : 'New' }} Item</h2>
        <button (click)="showForm = false" class="text-gray-400 hover:text-gray-600">✕</button>
      </div>
      <form [formGroup]="form" (ngSubmit)="save()" class="p-6 space-y-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
          <input formControlName="name" class="input-field" placeholder="Item name"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea formControlName="description" class="input-field" rows="2"></textarea></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Price *</label>
            <input formControlName="price" type="number" step="0.01" class="input-field"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Tax Rate (%)</label>
            <input formControlName="taxRate" type="number" step="0.01" class="input-field"></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
            <select formControlName="categoryId" (change)="onCategoryChange(form.get('categoryId')!.value)" class="input-field">
              <option value="">Select category</option>
              <option *ngFor="let c of categories" [value]="c.id">{{ c.name }}</option>
            </select></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Item Type</label>
            <select formControlName="itemType" class="input-field">
              <option *ngFor="let t of itemTypes" [value]="t">{{ t | titlecase }}</option>
            </select></div>
        </div>
        <div *ngIf="subCategories.length > 0">
          <label class="block text-sm font-medium text-gray-700 mb-1">Sub-Category</label>
          <select formControlName="subCategoryId" class="input-field">
            <option value="">None</option>
            <option *ngFor="let sc of subCategories" [value]="sc.id">{{ sc.name }}</option>
          </select>
        </div>
        <div class="grid grid-cols-4 gap-2">
          <div><label class="block text-xs font-medium text-gray-500 mb-1">Calories</label>
            <input formControlName="calories" type="number" class="input-field text-sm py-2"></div>
          <div><label class="block text-xs font-medium text-gray-500 mb-1">Protein</label>
            <input formControlName="protein" type="number" class="input-field text-sm py-2"></div>
          <div><label class="block text-xs font-medium text-gray-500 mb-1">Carbs</label>
            <input formControlName="carbs" type="number" class="input-field text-sm py-2"></div>
          <div><label class="block text-xs font-medium text-gray-500 mb-1">Fat</label>
            <input formControlName="fat" type="number" class="input-field text-sm py-2"></div>
        </div>
        <div class="flex gap-6">
          <label class="flex items-center gap-2 text-sm">
            <input formControlName="isFeatured" type="checkbox"> Featured
          </label>
          <label class="flex items-center gap-2 text-sm">
            <input formControlName="status" type="checkbox"> Active
          </label>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" [disabled]="saving" class="btn-primary flex-1">{{ saving ? 'Saving...' : 'Save Item' }}</button>
          <button type="button" (click)="showForm = false" class="btn-secondary flex-1">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
