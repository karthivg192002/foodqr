<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Dashboard Widgets</h1>
    <button (click)="openCreate()" class="btn-primary px-4 py-2 rounded-lg text-sm font-medium">+ Add Widget</button>
  </div>

  <div *ngIf="loading" class="flex justify-center py-10">
    <div class="animate-spin w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full"></div>
  </div>

  <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <div *ngFor="let s of sections" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
      <div class="flex items-start justify-between">
        <div>
          <p class="font-semibold text-gray-900">{{ s.title }}</p>
          <p class="text-xs text-gray-500 mt-0.5">{{ widgetLabel(s.widgetType) }} · {{ metricLabel(s.metricKey) }}</p>
        </div>
        <div class="flex items-center gap-2">
          <button (click)="toggle(s)"
            [class]="s.isVisible ? 'text-green-600' : 'text-gray-400'"
            class="text-xs font-medium">{{ s.isVisible ? 'Visible' : 'Hidden' }}</button>
        </div>
      </div>
      <div class="flex gap-2 mt-4">
        <button (click)="openEdit(s)" class="text-xs text-blue-600 font-medium hover:underline">Edit</button>
        <button (click)="remove(s.id)" class="text-xs text-red-500 font-medium hover:underline">Delete</button>
      </div>
    </div>

    <div *ngIf="!sections.length" class="col-span-3 text-center py-16 text-gray-400">
      <p class="text-4xl mb-3">📊</p>
      <p class="font-medium">No dashboard widgets configured yet</p>
      <p class="text-sm mt-1">Click "Add Widget" to create your first KPI card</p>
    </div>
  </div>
</div>

<!-- Modal -->
<div *ngIf="showModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
    <h2 class="text-lg font-bold mb-4">{{ editing ? 'Edit Widget' : 'New Widget' }}</h2>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
        <input [(ngModel)]="form.title" placeholder="e.g. Total Revenue"
          class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm outline-none focus:border-orange-400">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Widget Type</label>
        <select [(ngModel)]="form.widgetType" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm">
          <option *ngFor="let w of widgetTypes" [value]="w.value">{{ w.label }}</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Metric</label>
        <select [(ngModel)]="form.metricKey" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm">
          <option value="">-- Select metric --</option>
          <option *ngFor="let m of metricKeys" [value]="m.value">{{ m.label }}</option>
        </select>
      </div>
      <div class="flex items-center gap-2">
        <input type="checkbox" [(ngModel)]="form.isVisible" id="visible" class="w-4 h-4 accent-orange-500">
        <label for="visible" class="text-sm text-gray-700">Visible on dashboard</label>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Sort Order</label>
        <input type="number" [(ngModel)]="form.sortOrder" min="0"
          class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm">
      </div>
    </div>

    <div class="flex gap-3 mt-6">
      <button (click)="save()" class="flex-1 btn-primary py-2.5 rounded-xl text-sm font-medium">Save</button>
      <button (click)="showModal = false" class="flex-1 border border-gray-300 py-2.5 rounded-xl text-sm font-medium text-gray-700">Cancel</button>
    </div>
  </div>
</div>
