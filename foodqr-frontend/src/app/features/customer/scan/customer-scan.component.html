<div class="px-4 py-6 max-w-md mx-auto fade-in-up">

  <div class="text-center mb-6">
    <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-3 shadow-card"
      style="background:linear-gradient(135deg,#ea580c,#fb923c)">
      <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
          d="M4 4h4v4H4V4zm0 12h4v4H4v-4zm12-12h4v4h-4V4zM4 10h4M16 10h4M10 4v4m0 4h4m-4 4v8m6-8h4v4h-4v-4z"/>
      </svg>
    </div>
    <h1 class="text-xl font-extrabold text-gray-900 tracking-tight">Scan &amp; Order</h1>
    <p class="text-sm text-gray-500 mt-1">Point your camera at the QR code on your table</p>
  </div>

  <div class="relative rounded-3xl overflow-hidden shadow-card bg-gray-900 aspect-square">
    <div [id]="'customer-qr-scanner'" class="w-full h-full"></div>
    <div *ngIf="scanning" class="absolute inset-0 pointer-events-none flex items-center justify-center">
      <div class="w-56 h-56 rounded-2xl" style="border:3px solid rgba(251,146,60,0.85);box-shadow:0 0 0 9999px rgba(0,0,0,0.35)"></div>
    </div>
  </div>

  <p *ngIf="cameraError" class="text-center text-sm text-red-500 mt-4">{{ cameraError }}</p>

  <div class="mt-8">
    <div class="flex items-center gap-3 mb-3">
      <div class="h-px flex-1 bg-gray-200"></div>
      <span class="text-xs font-semibold uppercase tracking-wide text-gray-400">or enter code</span>
      <div class="h-px flex-1 bg-gray-200"></div>
    </div>
    <form (ngSubmit)="submitManualCode()" class="flex gap-2">
      <input [(ngModel)]="manualCode" name="manualCode" type="text" placeholder="Table code, e.g. table-12"
        class="flex-1 px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400" />
      <button type="submit"
        class="px-5 py-3 rounded-xl bg-orange-500 text-white text-sm font-semibold shadow-card hover:bg-orange-600 transition-colors">
        Go
      </button>
    </form>
  </div>
</div>
