<div class="bg-cust-surface min-h-screen pb-6 font-work animate-fade-in-up">
<div class="lg:max-w-5xl lg:mx-auto">

  <!-- Hero -->
  <section class="px-5 pt-5 pb-6">
    <h1 class="font-jakarta text-[30px] sm:text-[36px] font-extrabold leading-tight text-cust-on-surface">
      {{ greeting }}<br/><span class="text-cust-primary-container">Hungry?</span>
    </h1>
    <p class="font-work text-cust-secondary mt-1">Discover the best flavors, freshly made for you.</p>

    <form (ngSubmit)="submitSearch()" class="relative flex items-center mt-4">
      <span class="material-symbols-outlined absolute left-4 text-cust-secondary">search</span>
      <input [(ngModel)]="search" name="search" type="text" placeholder="Search for dishes, drinks..."
        class="w-full pl-12 pr-4 py-4 rounded-xl border-none bg-cust-surface-container-low shadow-sm focus:ring-2 focus:ring-cust-primary-container font-work outline-none text-cust-on-surface placeholder:text-cust-secondary">
    </form>
  </section>

  <!-- Categories -->
  <section *ngIf="categories.length" class="mb-7">
    <div class="flex items-center justify-between px-5 mb-3">
      <h2 class="font-jakarta text-lg font-bold text-cust-on-surface">Categories</h2>
    </div>
    <div class="flex gap-4 overflow-x-auto px-5 hide-scrollbar">
      <button *ngFor="let cat of categories" (click)="goToCategory(cat.id)" class="flex flex-col items-center gap-1.5 shrink-0 active:scale-95 transition-transform">
        <div class="w-16 h-16 rounded-full bg-cust-secondary-fixed flex items-center justify-center text-2xl overflow-hidden">
          <img *ngIf="cat.image" [src]="cat.image" class="w-full h-full object-cover">
          <span *ngIf="!cat.image">{{ cat.icon || '🍴' }}</span>
        </div>
        <span class="font-work text-xs font-semibold text-cust-on-surface">{{ cat.name }}</span>
      </button>
    </div>
  </section>

  <!-- Special offer banner -->
  <section *ngIf="banners.length" class="px-5 mb-7">
    <div *ngFor="let banner of banners | slice:0:1" class="relative w-full h-40 rounded-2xl overflow-hidden shadow-cust-banner">
      <img *ngIf="banner.image" [src]="banner.image" class="absolute inset-0 w-full h-full object-cover">
      <div *ngIf="!banner.image" class="absolute inset-0 bg-gradient-to-br from-cust-primary to-cust-primary-container"></div>
      <div class="absolute inset-0 bg-gradient-to-r from-black/70 to-transparent flex flex-col justify-center px-5">
        <span class="inline-block px-2 py-1 bg-cust-primary-container text-white font-work font-semibold text-[11px] rounded w-fit mb-1.5 uppercase tracking-wider">Limited Time</span>
        <h3 class="font-jakarta text-xl font-bold text-white">{{ banner.title }}</h3>
        <p *ngIf="banner.subtitle" class="text-white/80 text-sm mt-0.5">{{ banner.subtitle }}</p>
      </div>
    </div>
  </section>

  <!-- Recommended for You -->
  <section *ngIf="featuredItems.length" class="mb-7">
    <div class="flex items-center justify-between px-5 mb-3">
      <h2 class="font-jakarta text-lg font-bold text-cust-on-surface">Recommended for You</h2>
      <a routerLink="/customer/menu" class="text-cust-primary font-work font-semibold text-sm">View All</a>
    </div>
    <div class="flex gap-4 overflow-x-auto px-5 pb-1 hide-scrollbar">
      <app-product-tile *ngFor="let item of featuredItems" [item]="item" layout="card"
        (select)="goToItem(item)" (addToCart)="addToCart(item, $event)"></app-product-tile>
    </div>
  </section>

  <!-- Popular Choices bento grid -->
  <section *ngIf="popularItems.length" class="px-5">
    <h2 class="font-jakarta text-lg font-bold text-cust-on-surface mb-3">Popular Choices</h2>
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
      <div *ngFor="let item of popularItems | slice:0:4; let i = index" (click)="goToItem(item)"
        [class.col-span-2]="i === 3" class="lg:col-span-1 h-36 rounded-2xl bg-cust-surface-container relative overflow-hidden cursor-pointer active:scale-[0.98] transition-transform">
        <img *ngIf="item.thumbImage" [src]="item.thumbImage" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-black/75 to-transparent flex flex-col justify-end p-3.5">
          <span class="text-white font-work font-semibold text-sm">{{ item.name }}</span>
          <span class="text-white/70 text-xs">From {{ item.price | fqrCurrency }}</span>
        </div>
      </div>
    </div>
  </section>
</div>
</div>
