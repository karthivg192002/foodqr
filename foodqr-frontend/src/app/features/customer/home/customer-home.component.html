<div class="pb-4">
  <!-- Search bar + currency selector -->
  <div class="px-4 pt-4 pb-2 flex items-center gap-2">
    <div class="relative flex-1">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input [(ngModel)]="search" (ngModelChange)="loadItems()" type="text" placeholder="Search menu..."
        class="w-full pl-10 pr-4 py-2.5 bg-gray-100 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
    </div>
    <app-currency-selector></app-currency-selector>
  </div>

  <!-- Banners -->
  <div *ngIf="banners.length" class="px-4 mt-3">
    <div *ngFor="let banner of banners | slice:0:1" class="relative rounded-2xl overflow-hidden h-36">
      <img *ngIf="banner.image" [src]="banner.image" class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-r from-black/50 to-transparent flex items-center p-4">
        <div class="text-white">
          <h3 class="font-bold text-lg">{{ banner.title }}</h3>
          <p class="text-sm opacity-90">{{ banner.subtitle }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Category filter -->
  <div class="mt-4 px-4">
    <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-none">
      <button (click)="selectCategory('')"
        [class]="!selectedCategory ? 'bg-orange-500 text-white' : 'bg-gray-100 text-gray-600'"
        class="flex-shrink-0 px-4 py-2 rounded-xl text-sm font-medium">All</button>
      <button *ngFor="let cat of categories" (click)="selectCategory(cat.id)"
        [class]="selectedCategory === cat.id ? 'bg-orange-500 text-white' : 'bg-gray-100 text-gray-600'"
        class="flex-shrink-0 px-4 py-2 rounded-xl text-sm font-medium">
        {{ cat.icon }} {{ cat.name }}
      </button>
    </div>
    <!-- Sub-category chips shown when a parent with children is selected -->
    <div *ngIf="subCategories.length" class="flex gap-2 overflow-x-auto pb-1 scrollbar-none mt-2">
      <button (click)="selectSubCategory('')"
        [class]="!selectedSubCategory ? 'bg-orange-200 text-orange-800' : 'bg-gray-50 text-gray-500'"
        class="flex-shrink-0 px-3 py-1 rounded-lg text-xs font-medium border border-orange-200">All</button>
      <button *ngFor="let sub of subCategories" (click)="selectSubCategory(sub.id)"
        [class]="selectedSubCategory === sub.id ? 'bg-orange-200 text-orange-800' : 'bg-gray-50 text-gray-500'"
        class="flex-shrink-0 px-3 py-1 rounded-lg text-xs font-medium border border-gray-200">
        {{ sub.name }}
      </button>
    </div>
  </div>

  <!-- Featured items -->
  <div *ngIf="featuredItems.length && !search && !selectedCategory" class="mt-5">
    <h2 class="px-4 font-bold text-gray-900 mb-3">Featured</h2>
    <div class="flex gap-3 overflow-x-auto px-4 pb-2">
      <div *ngFor="let item of featuredItems" class="flex-shrink-0 w-40 bg-white rounded-2xl shadow-sm overflow-hidden">
        <div class="h-24 bg-gray-100 relative">
          <img *ngIf="item.thumbImage" [src]="item.thumbImage" class="w-full h-full object-cover">
          <span class="absolute top-1 right-1 text-xs bg-yellow-400 text-white px-1.5 py-0.5 rounded-full">⭐</span>
        </div>
        <div class="p-2">
          <p class="font-medium text-gray-900 text-sm truncate">{{ item.name }}</p>
          <div class="flex items-center justify-between mt-1">
            <span class="text-orange-600 font-bold text-sm">{{ item.price | fqrCurrency }}</span>
            <button (click)="addToCart(item)" class="w-6 h-6 bg-orange-500 rounded-full text-white text-lg flex items-center justify-center leading-none">+</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- All items -->
  <div class="mt-5 px-4">
    <h2 class="font-bold text-gray-900 mb-3">{{ selectedCategory ? '' : 'All Items' }}</h2>

    <div *ngIf="loading" class="flex justify-center py-8">
      <div class="animate-spin w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full"></div>
    </div>

    <div *ngIf="!loading" class="space-y-3">
      <div *ngFor="let item of allItems" class="bg-white rounded-2xl shadow-sm p-3 flex gap-3">
        <div class="w-20 h-20 bg-gray-100 rounded-xl flex-shrink-0 overflow-hidden">
          <img *ngIf="item.thumbImage" [src]="item.thumbImage" class="w-full h-full object-cover">
          <div *ngIf="!item.thumbImage" class="w-full h-full flex items-center justify-center text-2xl">🍽️</div>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between">
            <div class="flex-1 min-w-0">
              <h3 class="font-semibold text-gray-900 truncate">{{ item.name }}</h3>
              <p class="text-xs text-gray-500 mt-0.5 line-clamp-2">{{ item.description }}</p>
            </div>
            <span [ngClass]="item.itemType === 'veg' ? 'border-green-500 text-green-500' : 'border-red-500 text-red-500'" class="border-2 rounded w-5 h-5 flex items-center justify-center flex-shrink-0 ml-2">
              <span class="w-2 h-2 rounded-full" [ngClass]="item.itemType === 'veg' ? 'bg-green-500' : 'bg-red-500'"></span>
            </span>
          </div>
          <div class="flex items-center justify-between mt-2">
            <span class="text-orange-600 font-bold">{{ item.price | fqrCurrency }}</span>
            <div class="flex items-center gap-2">
              <ng-container *ngIf="getCartQty(item.id) > 0; else addBtn">
                <div class="flex items-center gap-2 bg-orange-50 rounded-full px-2 py-1">
                  <button (click)="cartService.updateQuantity(item.id, undefined, getCartQty(item.id) - 1)" class="text-orange-500 font-bold w-5 h-5 flex items-center justify-center">−</button>
                  <span class="text-orange-600 font-semibold text-sm">{{ getCartQty(item.id) }}</span>
                  <button (click)="addToCart(item)" class="text-orange-500 font-bold w-5 h-5 flex items-center justify-center">+</button>
                </div>
              </ng-container>
              <ng-template #addBtn>
                <button (click)="addToCart(item)" class="bg-orange-500 text-white text-sm font-semibold px-3 py-1.5 rounded-full">Add</button>
              </ng-template>
            </div>
          </div>
        </div>
      </div>
      <p *ngIf="!allItems.length" class="text-center text-gray-400 py-8">No items found</p>
    </div>
  </div>
</div>
