<div class="bg-cust-surface min-h-screen font-work animate-fade-in-up">

  <!-- Search -->
  <div class="px-5 pt-5">
    <div class="relative">
      <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-cust-secondary">search</span>
      <input [(ngModel)]="search" (ngModelChange)="onSearchChange()" type="text" placeholder="Search our flavors..."
        class="w-full bg-cust-surface-container-low border-none rounded-xl py-3.5 pl-12 pr-4 focus:ring-2 focus:ring-cust-primary-container text-cust-on-surface placeholder:text-cust-secondary outline-none">
    </div>
  </div>

  <!-- Sticky category tabs -->
  <nav class="flex overflow-x-auto gap-2 py-4 px-5 hide-scrollbar sticky top-16 lg:top-0 bg-cust-surface z-30">
    <button (click)="selectCategory('')"
      [class]="!selectedCategoryId ? 'bg-cust-on-secondary-fixed text-white' : 'bg-cust-secondary-fixed text-cust-on-secondary-fixed-variant hover:bg-cust-secondary-container'"
      class="px-5 py-2 rounded-full whitespace-nowrap font-work font-semibold text-sm transition-all active:scale-95">All</button>
    <button *ngFor="let cat of categories" (click)="selectCategory(cat.id)"
      [class]="selectedCategoryId === cat.id ? 'bg-cust-on-secondary-fixed text-white' : 'bg-cust-secondary-fixed text-cust-on-secondary-fixed-variant hover:bg-cust-secondary-container'"
      class="px-5 py-2 rounded-full whitespace-nowrap font-work font-semibold text-sm transition-all active:scale-95">{{ cat.name }}</button>
  </nav>

  <div *ngIf="loading" class="flex justify-center py-16">
    <div class="animate-spin w-8 h-8 border-4 border-cust-primary-container border-t-transparent rounded-full"></div>
  </div>

  <!-- Menu sections -->
  <main class="px-5 pb-6" *ngIf="!loading">
    <section *ngFor="let section of sections" class="mt-2 mb-6">
      <h2 class="font-jakarta text-lg font-bold text-cust-on-surface mb-3">{{ section.heading }}</h2>
      <div class="space-y-3">
        <div *ngFor="let item of section.items; let i = index" (click)="goToItem(item)"
          [class.flex-row-reverse]="i % 2 === 1"
          class="bg-cust-surface-container-lowest rounded-2xl shadow-cust-card flex overflow-hidden p-3 gap-4 hover:shadow-lg transition-shadow cursor-pointer active:scale-[0.99]">
          <div class="w-28 h-28 rounded-xl overflow-hidden shrink-0 bg-cust-surface-container">
            <img *ngIf="item.thumbImage" [src]="item.thumbImage" class="w-full h-full object-cover">
            <div *ngIf="!item.thumbImage" class="w-full h-full flex items-center justify-center text-2xl">🍽️</div>
          </div>
          <div class="flex flex-col justify-between flex-grow min-w-0">
            <div>
              <h3 class="font-jakarta font-bold text-cust-on-surface leading-tight truncate">{{ item.name }}</h3>
              <p class="text-cust-secondary text-sm line-clamp-2 mt-1">{{ item.description }}</p>
            </div>
            <div class="flex justify-between items-center mt-2">
              <span class="font-jakarta font-bold text-cust-primary">{{ item.price | fqrCurrency }}</span>
              <button (click)="addToCart(item, $event)"
                class="w-9 h-9 rounded-full border-2 border-cust-primary-container text-cust-primary-container flex items-center justify-center active:bg-cust-primary-container active:text-white transition-all">
                <span class="material-symbols-outlined text-[20px]">add</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <p *ngIf="!sections.length" class="text-center text-cust-secondary py-16">No items found</p>
  </main>
</div>
