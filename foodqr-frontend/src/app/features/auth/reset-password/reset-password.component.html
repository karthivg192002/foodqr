<div class="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-gray-900">Reset Password</h2>
        <p class="text-gray-500 mt-1 text-sm">Enter your new password below</p>
      </div>

      <div *ngIf="done" class="text-center py-6">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <p class="text-gray-700 font-medium">Password reset successfully!</p>
        <a routerLink="/auth/login" class="btn-primary inline-block mt-6 px-8">Sign In</a>
      </div>

      <div *ngIf="!done" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">New Password</label>
          <input [(ngModel)]="password" type="password" class="input-field" placeholder="Min. 6 characters">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Confirm Password</label>
          <input [(ngModel)]="confirmPassword" type="password" class="input-field" placeholder="Repeat your password">
        </div>
        <button (click)="submit()" [disabled]="loading" class="btn-primary w-full py-3">
          {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>
      </div>

      <p class="text-center text-sm text-gray-500 mt-6">
        <a routerLink="/auth/login" class="text-orange-600 font-medium">← Back to login</a>
      </p>
    </div>
  </div>
</div>
