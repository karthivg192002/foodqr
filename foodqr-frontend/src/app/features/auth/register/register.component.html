<div class="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-orange-500 rounded-2xl mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-900">Create Account</h1>
      <p class="text-gray-500 mt-1">Join FoodQR today</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Full Name</label>
            <input formControlName="name" type="text" class="input-field" placeholder="John Doe">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
            <input formControlName="email" type="email" class="input-field" placeholder="you@example.com">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Phone (Optional)</label>
            <input formControlName="phone" type="tel" class="input-field" placeholder="+1 234 567 8900">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
            <input formControlName="password" type="password" class="input-field" placeholder="Min. 6 characters">
          </div>
          <button type="submit" [disabled]="loading" class="btn-primary w-full py-3 mt-2">
            {{ loading ? 'Creating account...' : 'Create Account' }}
          </button>
        </div>
      </form>
      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account? <a routerLink="/auth/login" class="text-orange-600 font-medium">Sign in</a>
      </p>
    </div>
  </div>
</div>
