<div class="pb-24">
  <!-- Search -->
  <div class="px-4 pt-4 pb-2">
    <div class="relative">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input [(ngModel)]="search" (ngModelChange)="loadItems()" type="text" placeholder="Search items..."
        class="w-full pl-10 pr-4 py-2.5 bg-gray-100 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
    </div>
  </div>

  <!-- Categories -->
  <div class="px-4 mt-2">
    <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-none">
      <button (click)="selectedCategory = ''; loadItems()"
        [class]="!selectedCategory ? 'bg-orange-500 text-white' : 'bg-gray-100 text-gray-600'"
        class="flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium">All</button>
      <button *ngFor="let cat of categories" (click)="selectedCategory = cat.id; loadItems()"
        [class]="selectedCategory === cat.id ? 'bg-orange-500 text-white' : 'bg-gray-100 text-gray-600'"
        class="flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium">{{ cat.name }}</button>
    </div>
  </div>

  <!-- Items -->
  <div class="px-4 mt-4">
    <div *ngIf="loading" class="flex justify-center py-8">
      <div class="animate-spin w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full"></div>
    </div>

    <div *ngIf="!loading" class="space-y-3">
      <div *ngFor="let item of items" class="bg-white rounded-2xl shadow-sm p-3 flex gap-3">
        <div class="w-20 h-20 bg-gray-100 rounded-xl flex-shrink-0 overflow-hidden">
          <img *ngIf="item.thumbImage" [src]="item.thumbImage" class="w-full h-full object-cover">
          <div *ngIf="!item.thumbImage" class="w-full h-full flex items-center justify-center text-2xl">🍽️</div>
        </div>
        <div class="flex-1 min-w-0">
          <h3 class="font-semibold text-gray-900 truncate">{{ item.name }}</h3>
          <p class="text-xs text-gray-500 line-clamp-2">{{ item.description }}</p>
          <div class="flex items-center justify-between mt-2">
            <span class="text-orange-600 font-bold">{{ item.price | fqrCurrency }}</span>
            <ng-container *ngIf="getCartQty(item.id) > 0; else addBtn">
              <div class="flex items-center gap-2 bg-orange-50 rounded-full px-2 py-1">
                <button (click)="cartService.updateQuantity(item.id, undefined, getCartQty(item.id) - 1)" class="text-orange-500 font-bold w-5 h-5 flex items-center justify-center">−</button>
                <span class="text-orange-600 font-semibold text-sm">{{ getCartQty(item.id) }}</span>
                <button (click)="addToCart(item)" class="text-orange-500 font-bold w-5 h-5 flex items-center justify-center">+</button>
              </div>
            </ng-container>
            <ng-template #addBtn>
              <button (click)="addToCart(item)" class="bg-orange-500 text-white text-sm font-semibold px-3 py-1.5 rounded-full">Add</button>
            </ng-template>
          </div>
        </div>
      </div>
      <p *ngIf="!items.length" class="text-center text-gray-400 py-8">No items found</p>
    </div>
  </div>
</div>

<!-- Sticky cart button -->
<div *ngIf="cartService.count > 0" class="fixed bottom-4 left-4 right-4 max-w-lg mx-auto z-50">
  <button (click)="goToCart()" class="w-full bg-orange-500 text-white rounded-2xl py-4 flex items-center justify-between px-5 shadow-lg">
    <span class="bg-orange-600 text-white text-sm font-bold rounded-xl px-2 py-0.5">{{ cartService.count }}</span>
    <span class="font-bold text-lg">View Cart</span>
    <span class="font-bold">{{ cartService.total | fqrCurrency }}</span>
  </button>
</div>
