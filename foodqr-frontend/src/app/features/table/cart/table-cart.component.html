<div class="px-4 lg:px-0 py-4 lg:py-8">
  <div class="flex items-center gap-3 mb-5">
    <a [routerLink]="['/table', slug, 'menu']" class="text-gray-500 hover:text-gray-700">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <h1 class="font-bold text-xl text-gray-900">Your Order</h1>
  </div>

  <div *ngIf="cartService.isEmpty" class="text-center py-16">
    <div class="text-6xl mb-4">🛒</div>
    <p class="text-gray-500 font-medium">Your cart is empty</p>
    <a [routerLink]="['/table', slug, 'menu']" class="btn-primary inline-block mt-4 px-6">Browse Menu</a>
  </div>

  <div *ngIf="!cartService.isEmpty">
    <div class="space-y-3 mb-5">
      <div *ngFor="let item of cartService.items" class="bg-white rounded-2xl p-3 flex gap-3 shadow-sm">
        <div class="w-14 h-14 bg-gray-100 rounded-xl overflow-hidden flex-shrink-0">
          <img *ngIf="item.item.thumbImage" [src]="item.item.thumbImage" class="w-full h-full object-cover">
        </div>
        <div class="flex-1 min-w-0">
          <p class="font-semibold text-gray-900 truncate">{{ item.item.name }}</p>
          <p *ngIf="item.variation" class="text-xs text-gray-500">{{ item.variation.name }}</p>
          <p class="text-orange-600 font-semibold">{{ getItemPrice(item) | fqrCurrency }}</p>
        </div>
        <div class="flex items-center gap-2 bg-orange-50 rounded-full px-2 py-1 self-center">
          <button (click)="cartService.updateQuantity(item.item.id, item.variation?.id, item.quantity - 1)"
            class="text-orange-500 font-bold w-5 h-5 flex items-center justify-center">−</button>
          <span class="text-orange-600 font-semibold text-sm w-5 text-center">{{ item.quantity }}</span>
          <button (click)="cartService.updateQuantity(item.item.id, item.variation?.id, item.quantity + 1)"
            class="text-orange-500 font-bold w-5 h-5 flex items-center justify-center">+</button>
        </div>
      </div>
    </div>

    <!-- Payment method -->
    <div class="bg-white rounded-2xl p-4 shadow-sm mb-4">
      <h3 class="font-semibold text-gray-900 mb-3">Payment Method</h3>
      <div class="space-y-2">
        <label *ngFor="let gw of enabledGateways"
          class="flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition"
          [class]="paymentMethod === gw.slug ? 'border-orange-500 bg-orange-50' : 'border-gray-200'">
          <input type="radio" [value]="gw.slug" [(ngModel)]="paymentMethod" [disabled]="gw.isActive === false" class="text-orange-500">
          <span class="text-sm font-medium text-gray-800">{{ gw.name }}</span>
        </label>
      </div>
    </div>

    <!-- Note -->
    <div class="bg-white rounded-2xl p-4 shadow-sm mb-4">
      <textarea [(ngModel)]="orderNote" placeholder="Special requests..."
        class="w-full text-sm text-gray-700 resize-none focus:outline-none" rows="2"></textarea>
    </div>

    <!-- Summary -->
    <div class="bg-white rounded-2xl p-4 shadow-sm mb-5">
      <div class="flex justify-between font-bold text-gray-900 text-base">
        <span>Total</span><span class="text-orange-600">{{ cartService.total | fqrCurrency }}</span>
      </div>
    </div>

    <button (click)="placeOrder()" [disabled]="placing" class="btn-primary w-full py-4 text-base font-bold">
      {{ placing ? 'Placing...' : 'Place Order' }}
    </button>
  </div>
</div>
