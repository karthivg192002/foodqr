<div class="flex flex-col items-center justify-center min-h-[80vh] px-6 text-center">
  <div *ngIf="loading">
    <div class="animate-spin w-10 h-10 border-4 border-orange-500 border-t-transparent rounded-full mx-auto mb-4"></div>
    <p class="text-gray-500">Loading table info...</p>
  </div>

  <div *ngIf="error" class="text-center">
    <div class="text-6xl mb-4">❌</div>
    <p class="text-red-500 font-medium">{{ error }}</p>
  </div>

  <div *ngIf="!loading && table">
    <div class="w-24 h-24 bg-orange-100 rounded-3xl flex items-center justify-center mb-5 mx-auto">
      <span class="text-5xl">🍽️</span>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">{{ table.name }}</h1>
    <p class="text-gray-500 mt-1">Capacity: {{ table.capacity }} guests</p>
    <div class="mt-2">
      <span [class]="table.status === 'available' ? 'badge-success' : 'badge-warning'" class="badge capitalize">
        {{ table.status }}
      </span>
    </div>
    <p class="mt-4 text-gray-600 text-sm">Welcome! Browse the menu and place your order directly from this device.</p>
    <button (click)="proceed()" class="btn-primary w-full py-4 text-lg font-bold mt-8">
      View Menu &amp; Order
    </button>
  </div>
</div>
