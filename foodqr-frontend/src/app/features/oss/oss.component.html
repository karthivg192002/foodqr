<div class="min-h-screen bg-gray-950 p-6">
  <!-- Header -->
  <div class="text-center mb-8">
    <h1 class="text-white text-4xl font-bold">Order Status</h1>
    <div class="flex items-center justify-center gap-2 mt-2 text-green-400">
      <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
      <span class="text-sm">Live Updates</span>
    </div>
  </div>

  <div *ngIf="!orders.length" class="text-center py-20">
    <p class="text-gray-500 text-xl">No active orders</p>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    <div *ngFor="let order of orders"
      class="rounded-2xl overflow-hidden flex flex-col">

      <!-- Order number header -->
      <div class="bg-gray-800 px-4 py-3">
        <p class="text-white font-bold text-xl">#{{ order.orderSerialNo }}</p>
        <p class="text-gray-400 text-xs">{{ order.orderType | uppercase }}</p>
      </div>

      <!-- Status banner -->
      <div [ngClass]="[statusStyle(order.status).bg, statusStyle(order.status).text]"
        class="py-4 text-center">
        <p class="text-lg font-bold">{{ statusStyle(order.status).label }}</p>
      </div>

      <!-- Items -->
      <div class="bg-gray-800 px-4 py-3 flex-1">
        <div *ngFor="let item of order.items" class="text-sm text-gray-300 flex justify-between py-0.5">
          <span>{{ item.itemName }}</span>
          <span class="text-white font-bold">x{{ item.quantity }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
