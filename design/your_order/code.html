<script>
        // Micro-interaction for the Place Order button
        const placeOrderBtn = document.getElementById('placeOrderBtn');
        placeOrderBtn.addEventListener('click', () => {
            placeOrderBtn.innerHTML = `
                <div class="flex items-center gap-3">
                    <svg class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Processing...</span>
                </div>
            `;
            setTimeout(() => {
                placeOrderBtn.classList.remove('bg-primary-container');
                placeOrderBtn.classList.add('bg-green-600');
                placeOrderBtn.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined">check_circle</span>
                        <span>Order Placed!</span>
                    </div>
                `;
            }, 1500);
        });

        // Quantity adjust logic (visual only for prototype)
        document.querySelectorAll('.material-symbols-outlined').forEach(icon => {
            if(icon.innerText === 'add' || icon.innerText === 'remove') {
                icon.parentElement.addEventListener('click', (e) => {
                    const span = e.currentTarget.parentElement.querySelector('span:not(.material-symbols-outlined)');
                    let val = parseInt(span.innerText);
                    if(icon.innerText === 'add') val++;
                    if(icon.innerText === 'remove' && val > 0) val--;
                    span.innerText = val;
                });
            }
        });
    </script>
